name: AI Docs Freshness

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 4 * * *"

jobs:
  ai-docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Style Check Feature Matrix Script
        run: |
          python3 -m pip install --disable-pip-version-check black==24.10.0
          python3 -m black --check scripts/feature_matrix_ci.py

      - name: Build Bootstrap
        run: |
          printf "4\n" | python3 setup-ai-docs.py

      - name: Syntax Lint (py_compile)
        run: |
          python3 -m py_compile setup-ai-docs.py
          find src tests -name '*.py' -print0 | xargs -0 -n1 python3 -m py_compile

      - name: Run Unit Tests
        run: |
          python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Run Feature Matrix Validation (Fast Tier)
        if: github.event_name == 'pull_request'
        run: |
          python3 scripts/feature_matrix_ci.py \
            --bootstrap ./ai-docs-bootstrap \
            --tier fast \
            --summary-path .ci-artifacts/feature-matrix-summary-fast.json \
            --history-path .ci-artifacts/feature-matrix-duration-history-fast.json

      - name: Matrix Duration Trend (PR Warning)
        if: github.event_name == 'pull_request'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path('.ci-artifacts/feature-matrix-summary-fast.json')
          summary = json.loads(summary_path.read_text(encoding='utf-8'))
          trend = summary.get('duration_trend', {})
          regression = bool(trend.get('regression'))
          if regression:
              baseline = trend.get('baseline_duration_ms')
              current = trend.get('current_duration_ms')
              print(f"::warning::Feature matrix fast tier regression detected: current={current}ms baseline={baseline}ms")
          else:
              print('Fast tier matrix duration trend is stable.')
          PY

      - name: Run Feature Matrix Validation (Full Tier)
        if: github.event_name != 'pull_request'
        run: |
          python3 scripts/feature_matrix_ci.py \
            --bootstrap ./ai-docs-bootstrap \
            --tier full \
            --summary-path .ci-artifacts/feature-matrix-summary-full.json \
            --history-path .ci-artifacts/feature-matrix-duration-history-full.json

      - name: Matrix Duration Trend (Main/Nightly Gate)
        if: github.event_name != 'pull_request'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path('.ci-artifacts/feature-matrix-summary-full.json')
          summary = json.loads(summary_path.read_text(encoding='utf-8'))
          trend = summary.get('duration_trend', {})
          regression = bool(trend.get('regression'))
          if regression:
              baseline = trend.get('baseline_duration_ms')
              current = trend.get('current_duration_ms')
              raise SystemExit(
                  f"Feature matrix full-tier regression detected: current={current}ms baseline={baseline}ms"
              )
          print('Full tier matrix duration trend is stable.')
          PY

      - name: Run Feature Snapshot Validation
        run: |
          python3 scripts/feature_snapshot_ci.py \
            --bootstrap ./ai-docs-bootstrap \
            --summary-path .ci-artifacts/feature-snapshot-summary.json \
            --diff-path .ci-artifacts/feature-snapshot-diffs.md

      - name: Sanity Check Non-Interactive Intent Mode
        run: |
          tmp_dir="$(mktemp -d)"
          ./ai-docs-bootstrap --project "$tmp_dir" --mode new --non-interactive --intent "ride booking ecommerce payments" --compliance "soc2,gdpr"
          test -f "$tmp_dir/.ai-docs/APP-BLUEPRINT.md"
          grep -q "Intent Ranking" "$tmp_dir/.ai-docs/APP-BLUEPRINT.md"
          grep -q "Security Audit Before Install" "$tmp_dir/.ai-docs/APP-BLUEPRINT.md"

      - name: Generate Compliance Artifacts Sample
        run: |
          sample_dir="$(mktemp -d)"
          ./ai-docs-bootstrap \
            --project "$sample_dir" \
            --mode new \
            --non-interactive \
            --intent "payments health data" \
            --compliance "pci-dss,hipaa,gdpr" \
            --compliance-level 3

          test -f "$sample_dir/.specs/compliance/pci-dss-patterns.md"
          test -f "$sample_dir/.specs/compliance/AI-ASSISTED-COMPLIANCE-ANALYSIS.md"
          test -f "$sample_dir/.specs/compliance/dashboard/index.html"

          mkdir -p .ci-artifacts
          cp -R "$sample_dir/.specs/compliance" .ci-artifacts/compliance
          cp "$sample_dir/.ai-docs/APP-BLUEPRINT.md" .ci-artifacts/APP-BLUEPRINT.md

      - name: Skip If Not Initialized
        id: guard
        run: |
          if [ ! -f AGENTS.md ] && [ ! -d .ai-docs ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "AI docs not initialized in this repository. Skipping freshness check."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify AI Docs Are Fresh
        id: freshness
        if: steps.guard.outputs.skip == 'false'
        run: |
          set +e
          ./ai-docs-bootstrap --project . --mode existing --check --report-path .ai-docs-check-report.md | tee ai-docs-check.log
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Stale Report
        if: steps.guard.outputs.skip == 'false' && steps.freshness.outputs.exit_code != '0'
        uses: actions/upload-artifact@v5
        with:
          name: ai-docs-freshness-report
          path: |
            .ai-docs-check-report.md
            ai-docs-check.log

      - name: Upload Compliance CI Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: compliance-ci-artifacts
          path: |
            .ci-artifacts
            .ai-docs-check-report.md
            ai-docs-check.log
            scripts/feature_matrix_ci.py
            scripts/feature_snapshot_ci.py
          if-no-files-found: ignore

      - name: Fail When Docs Are Stale
        if: steps.guard.outputs.skip == 'false' && steps.freshness.outputs.exit_code != '0'
        run: |
          echo "AI docs are stale. See ai-docs-freshness-report artifact."
          exit 1
